apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
- name: tdarr
  releaseName: tdarr
  namespace: tdarr
  repo: tdarr
  valuesFile: values.yaml

resources:
- configs/gateway.yaml

patches:
- target:
    kind: Deployment
    name: tdarr
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/1/env/2/value
      value: "172.19.0.6"
