apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-cm
data:
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: home-assistant
      app.kubernetes.io/name: home-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: home-assistant
        app.kubernetes.io/name: home-assistant
    spec:
      automountServiceAccountToken: true
      hostNetwork: true
      containers:
        - image: 'ghcr.io/home-assistant/home-assistant:2025.8.3'
          imagePullPolicy: IfNotPresent
          name: home-assistant
          ports:
            - containerPort: 8123
              name: http
              protocol: TCP
            - containerPort: 5353
              name: homekit-udp
              protocol: UDP
            - containerPort: 21063
              name: homekit-tcp
              protocol: TCP
          envFrom:
            - configMapRef:
                name: home-assistant-cm
                optional: true
          volumeMounts:
          - mountPath: /config
            name: config
        - image: ghcr.io/coder/code-server:4.19.0
          imagePullPolicy: IfNotPresent
          name: codeserver
          args:
            - "--auth"
            - "none"
            - "--port"
            - "12321"
            - "/config"
          ports:
            - containerPort: 12321
              name: codeserver
              protocol: TCP
          volumeMounts:
            - mountPath: /config
              name: config
          securityContext:
            runAsUser: 0
            runAsGroup: 0
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: home-assistant-config
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-lb-tcp
  annotations:
    metallb.universe.tf/address-pool: bgp-pool
    metallb.universe.tf/allow-shared-ip: hass
spec:
  selector:
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/name: home-assistant
  loadBalancerIP: 172.19.0.3
  externalTrafficPolicy: Local
  type: LoadBalancer
  ports:
  - name: http
    port: 8123
    protocol: TCP
    targetPort: http
  - name: homekit-tcp
    port: 21063
    protocol: TCP
    targetPort: homekit-tcp
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-lb-udp
  annotations:
    metallb.universe.tf/address-pool: bgp-pool
    metallb.universe.tf/allow-shared-ip: hass
spec:
  selector:
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/name: home-assistant
  loadBalancerIP: 172.19.0.3
  externalTrafficPolicy: Local
  type: LoadBalancer
  ports:
  - name: homekit-udp
    port: 5353
    protocol: UDP
    targetPort: homekit-udp
---
apiVersion: v1
kind: Service
metadata:
  name: codeserver
spec:
  selector:
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/name: home-assistant
  type: ClusterIP
  ports:
  - name: codeserver
    port: 12321
    protocol: TCP
    targetPort: codeserver
---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home-assistant
spec:
  parentRefs:
    - name: envoy
      namespace: envoy-gateway-system
  hostnames:
    - hass.burrell.tech
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: home-assistant-lb-tcp
          port: 8123

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: codeserver
spec:
  parentRefs:
    - name: envoy
      namespace: envoy-gateway-system
  hostnames:
    - code.hass.burrell.tech
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: codeserver
          port: 12321

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home-assistant-redirect
spec:
  parentRefs:
    - name: envoy
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - hass.burrell.tech
    - code.hass.burrell.tech
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---

apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: codeserver-whitelist
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: codeserver
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-private
        action: Allow
        principal:
          clientCIDRs:
            - 192.168.0.0/16
            - 172.16.0.0/12

---

apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: home-assistant-dns
spec:
  endpoints:
    - dnsName: hass.burrell.tech
      recordType: CNAME
      targets:
        - proxied.burrell.tech
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-config
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
  storageClassName: longhorn
