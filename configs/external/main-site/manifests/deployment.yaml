apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-site
  labels:
    app.kubernetes.io/name: main-site
    app.kubernetes.io/instance: main-site
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: main-site
      app.kubernetes.io/instance: main-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: main-site
        app.kubernetes.io/instance: main-site
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: site-content
              mountPath: /git
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi

        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.6.0
          env:
            - name: GITSYNC_REPO
              value: https://github.com/noahburrell0/burrell-tech.git
            - name: GITSYNC_REF
              value: main
            - name: GITSYNC_ROOT
              value: /git
            - name: GITSYNC_LINK
              value: current
            - name: GITSYNC_PERIOD
              value: "30s"
            - name: GITSYNC_SPARSE_CHECKOUT_FILE
              value: /etc/git-sync/sparse-checkout
          volumeMounts:
            - name: site-content
              mountPath: /git
            - name: sparse-patterns
              mountPath: /etc/git-sync
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534

      volumes:
        - name: site-content
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: main-site-nginx-config
        - name: sparse-patterns
          configMap:
            name: git-sync-sparse-checkout
