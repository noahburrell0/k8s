apiVersion: v1
kind: ConfigMap
metadata:
  name: contact-api-cm
data:
  SUBJECT_PREAMBLE: "[Contact Form]"
  FROM_ADDRESS: "contact@burrell.tech"
  TO_ADDRESS: noah@burrell.tech
  SMTP_SERVER: smtp.smtp

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: contact-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: contact-api
      app.kubernetes.io/name: contact-api
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: contact-api
        app.kubernetes.io/name: contact-api
    spec:
      automountServiceAccountToken: true
      containers:
        - image: 'ghcr.io/noahburrell0/contact-api:v0.1.2'
          imagePullPolicy: IfNotPresent
          name: contact-api
          ports:
            - containerPort: 5000
              name: contact-api
              protocol: TCP
          envFrom:
            - configMapRef:
                name: contact-api-cm
---

apiVersion: v1
kind: Service
metadata:
  name: contact-api
spec:
  selector:
    app.kubernetes.io/instance: contact-api
    app.kubernetes.io/name: contact-api
  ports:
  - name: http
    port: 5000

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: contact-api
spec:
  parentRefs:
    - name: envoy
      namespace: envoy-gateway-system
  hostnames:
    - api.burrell.tech
  rules:
    - matches:
        - path:
            type: Exact
            value: /contact
      backendRefs:
        - name: contact-api
          port: 5000

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: contact-api-redirect
spec:
  parentRefs:
    - name: envoy
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - api.burrell.tech
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---

apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: contact-api-cors
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: contact-api
  cors:
    allowOrigins:
      - "https://burrell.tech"
      - "https://www.burrell.tech"
      - "http://localhost"
      - "http://localhost:8080"
      - "http://192.168.1.2"
    allowMethods:
      - POST
      - OPTIONS
    allowHeaders:
      - Content-Type
      - Authorization
      - Accept
      - Origin

---

apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: contact-api-dns
spec:
  endpoints:
    - dnsName: api.burrell.tech
      recordType: CNAME
      targets:
        - proxied.burrell.tech
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"