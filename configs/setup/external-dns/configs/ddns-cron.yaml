apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ddns
rules:
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["*"]
- apiGroups: ["batch"]
  resources: ["cronjobs"]
  verbs: ['*']
---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ddns
subjects:
- kind: ServiceAccount
  name: ddns
  namespace: external-dns
roleRef:
  kind: Role
  name: ddns
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ddns

---

apiVersion: batch/v1
kind: CronJob
metadata:
  name: ddns
spec:
  schedule: "*/2 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ddns
          containers:
          - name: ddns
            image: alpine/k8s:1.26.0
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              export CRONJOB_UID=$(kubectl get cronjob ddns -o=jsonpath='{.metadata.uid}')
              cat << EOF > /tmp/ingress.yml && kubectl apply -f /tmp/ingress.yml
              apiVersion: externaldns.k8s.io/v1alpha1
              kind: DNSEndpoint
              metadata:
                name: ip-proxied
                ownerReferences:
                  - apiVersion: batch/v1
                    blockOwnerDeletion: false
                    controller: true
                    kind: CronJob
                    name: ddns
                    uid: $CRONJOB_UID
              spec:
                endpoints:
                  - dnsName: '$IP_HOSTNAME_PROXIED'
                    recordType: A
                    targets:
                      - '$(curl --silent ifconfig.me)'
                    providerSpecific:
                      - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
                        value: "true"
              ---
              apiVersion: externaldns.k8s.io/v1alpha1
              kind: DNSEndpoint
              metadata:
                name: ip-unproxied
                ownerReferences:
                  - apiVersion: batch/v1
                    blockOwnerDeletion: false
                    controller: true
                    kind: CronJob
                    name: ddns
                    uid: $CRONJOB_UID
              spec:
                endpoints:
                  - dnsName: '$IP_HOSTNAME_UNPROXIED'
                    recordType: A
                    targets:
                      - '$(curl --silent ifconfig.me)'
                    providerSpecific:
                      - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
                        value: "false"
              EOF
            env:
            - name: IP_HOSTNAME_PROXIED
              value: proxied.burrell.tech
            - name: IP_HOSTNAME_UNPROXIED
              value: unproxied.burrell.tech
          restartPolicy: OnFailure
