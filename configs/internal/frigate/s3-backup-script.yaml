apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-s3-backup-script
data:
  backup.sh: |
    #!/bin/sh
    set -e

    SYNC_INTERVAL="${SYNC_INTERVAL:-60}"
    MIN_AGE="${MIN_AGE:-2m}"

    echo "Starting S3 backup sidecar"
    echo "  Interval: ${SYNC_INTERVAL}s"
    echo "  Min age:  ${MIN_AGE}"
    echo "  Bucket:   ${S3_BUCKET}"

    while true; do
      echo "[$(date)] Syncing recordings to S3..."
      rclone copy /media/frigate/ ":s3:${S3_BUCKET}/" \
        --min-age "${MIN_AGE}" \
        --transfers 4 \
        --checkers 8 \
        --log-level INFO \
        --s3-provider Wasabi \
        --s3-region "${S3_REGION}" \
        --s3-endpoint "${S3_ENDPOINT}" \
        --s3-access-key-id "${S3_ACCESS_KEY_ID}" \
        --s3-secret-access-key "${S3_SECRET_ACCESS_KEY}" \
        --s3-no-check-bucket \
        --exclude "*_cache/**" \
        --exclude "cache/**"
      echo "[$(date)] Sync complete"
      sleep "${SYNC_INTERVAL}"
    done
