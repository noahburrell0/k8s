env:
  TZ: America/Toronto
  PUID: 0
  PGUID: 0
  THREADS_WORKER_INIT_TIMEOUT: 200000

image:
  tag: 2.64.02
  repository: haveagitgat/tdarr

service:
  server:
    enabled: true
    type: LoadBalancer
    annotations:
      metallb.universe.tf/address-pool: bgp-pool
      metallb.io/loadBalancerIPs: "172.19.0.6"
      coredns.io/hostname: server.tdarr.home.burrell.tech
    externalTrafficPolicy: Local
    ports:
      controller-lb:
        enabled: true
        port: 8266
        nodePort: 8266
        targetPort: 8266
        protocol: TCP

ingress:
  main:
    enabled: false

node:
  enabled: true
  id: k8s-node
  image:
    tag: 2.64.02
  resources:
    limits:
      cpu: 4
      memory: 4Gi
    requests:
      cpu: 1m
      memory: 1Mi

persistence:
  config:
    enabled: true
    nameOverride: longhorn-config
    storageClass: longhorn
    size: 10Gi
    accessMode: ReadWriteOnce
  data:
    enabled: true
    nameOverride: longhorn-data
    storageClass: longhorn
    size: 80Gi
    accessMode: ReadWriteOnce
  media:
    enabled: true
    type: nfs
    server: 192.168.1.10
    path: /Media
    mountPath: /media

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

probes:
  startup:
    spec:
      failureThreshold: 2000

initContainers:
  skip-chown:
    image: busybox:1.28
    command: ['sh', '-c', "touch /firstRun"]
