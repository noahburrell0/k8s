image:
  pullPolicy: IfNotPresent
  repository: ghcr.io/paperless-ngx/paperless-ngx
  tag: 2.20.13

env:
  PAPERLESS_TIME_ZONE: America/New_York
  PAPERLESS_OCR_LANGUAGE: eng
  PAPERLESS_CONSUMER_POLLING: 60
  PAPERLESS_REDIS: redis://paperless-redis-headless:6379
  PAPERLESS_URL: https://paperless.burrell.tech
  PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
  PAPERLESS_DISABLE_REGULAR_LOGIN: "True"
  PAPERLESS_REDIRECT_LOGIN_TO_SSO: "True"
  PAPERLESS_SOCIAL_AUTO_SIGNUP: "True"
  PAPERLESS_LOGOUT_REDIRECT_URL: https://auth.burrell.tech/oidc/logout

ingress:
  main:
    enabled: false

persistence:
  consume:
    enabled: true
    type: nfs
    server: "192.168.1.10"
    path: /Media/Paperless-Consumer
    mountPath: /usr/src/paperless/consume
  data:
    enabled: true
    nameOverride: longhorn-data
    storageClass: longhorn
    size: 100Gi
  media:
    enabled: true
    nameOverride: longhorn-media
    storageClass: longhorn
    size: 25Gi
    mountPath: /usr/src/paperless/media
  export:
    enabled: true
    nameOverride: longhorn-export
    storageClass: longhorn
    size: 25Gi
    mountPath: /usr/src/paperless/export

redis:
  enabled: true

  image:
    pullPolicy: IfNotPresent
    repository: bitnamilegacy/redis
    tag: 6.2.14-debian-12-r27

  architecture: standalone
  auth:
    enabled: false

  master:
    persistence:
      enabled: false
