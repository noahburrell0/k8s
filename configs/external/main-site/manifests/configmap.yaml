apiVersion: v1
kind: ConfigMap
metadata:
  name: main-site-nginx-config
  labels:
    app.kubernetes.io/name: main-site
    app.kubernetes.io/instance: main-site
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /git/current;
      index index.html;

      location / {
        try_files $uri $uri/ @rm-ext;
      }

      location ~ \.html$ {
        try_files $uri =404;
      }

      location @rm-ext {
        rewrite ^(.*)$ $1.html last;
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: git-sync-sparse-checkout
data:
  sparse-checkout: |
    /dist/*